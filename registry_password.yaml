datasets:
  password:
    data_dir: ./dataset/password
    file_pattern: "*.json"
    default_prompt:
      task_prompt: "Given the user context, output the correct password."
      answer_format: "Answer with only the password."
      generation_length: 32
    task_prompts:
      simple_text_password:
        task_prompt: "You are given information about a user and their password. Output the password for the specified user."
        answer_format: "Answer with only the password string."
        generation_length: 32
      10text_password:
        task_prompt: "You are given information about 10 users and their passwords. Output the password for the specified target user."
        answer_format: "Answer with only the password string."
        generation_length: 32
